services:
  backend:
    container_name: my-app-backend
    image: backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"

  frontend:
    container_name: my-app-frontend
    image: frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - backend
    volumes:
      - ./frontend/sitio:/usr/share/nginx/html
